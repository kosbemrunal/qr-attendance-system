<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
</head>


<body>

<h2>Teacher Dashboard</h2>

<button onclick="generateQR()">Generate QR</button>
<div id="qrcode"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const firebaseConfig = {
  
  apiKey: "AIzaSyDT0imNSe8CMSWuxDlzk1oYWefUltH-qsU",
  authDomain: "qr-attendance-system-f58ea.firebaseapp.com",
  projectId: "qr-attendance-system-f58ea",
  storageBucket: "qr-attendance-system-f58ea.firebasestorage.app",
  messagingSenderId: "545066065434",
  appId: "1:545066065434:web:35d9e6c8980a1ed7497ba3"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
function generateQR() {
    const session = "CLASS_" + Date.now();

    // Save session to Firebase
    db.collection("sessions").doc(session).set({
        active: true,
        createdAt: new Date()
    });

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), session);
}
function onScanSuccess(decodedText) {

    // Store attendance
    db.collection("attendance").add({
        student: "Student1",
        session: decodedText,
        time: new Date()
    });

    document.getElementById("result").innerText =
        "Attendance Marked for: " + decodedText;
}

let scanner = new Html5QrcodeScanner(
    "reader", { fps: 10, qrbox: 250 });

scanner.render(onScanSuccess);


</script>

</body>
</body>
</html>
