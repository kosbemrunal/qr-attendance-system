<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
</head>


<body>

<h2>Teacher Dashboard</h2>
<label>Subject:</label>
<input type="text" id="subject" placeholder="Enter Subject">

<br><br>

<label>Time Slot (minutes):</label>
<input type="number" id="duration" placeholder="e.g. 3">

<br><br>

<button onclick="generateQR()">Generate QR</button>
<div id="qrcode"></div>

<h3>Attendance List</h3>

<table border="1" id="attendanceTable">
    <tr>
        <th>Student</th>
        <th>Subject</th>
        <th>Status</th>
        <th>Time</th>
    </tr>
</table>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    let unsubscribe = null;
const firebaseConfig = {
  
  apiKey: "AIzaSyDT0imNSe8CMSWuxDlzk1oYWefUltH-qsU",
  authDomain: "qr-attendance-system-f58ea.firebaseapp.com",
  projectId: "qr-attendance-system-f58ea",
  storageBucket: "qr-attendance-system-f58ea.firebasestorage.app",
  messagingSenderId: "545066065434",
  appId: "1:545066065434:web:35d9e6c8980a1ed7497ba3"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


function generateQR() {

    const subject = document.getElementById("subject").value;
    const duration = document.getElementById("duration").value;

    const createdAt = new Date().getTime();

    window.currentSession = createdAt;

    

    if (unsubscribe) {
        unsubscribe(); // stop previous listener
    }

    // ⭐ MOVE LISTENER HERE
    
    navigator.geolocation.getCurrentPosition((position) => {

        const teacherLat = position.coords.latitude;
        const teacherLng = position.coords.longitude;

        const sessionData = {
            subject: subject,
            createdAt: createdAt,
            duration: duration,
            lat: teacherLat,
            lng: teacherLng
        };

        const session = JSON.stringify(sessionData);

        db.collection("sessions").add(sessionData);

        document.getElementById("qrcode").innerHTML = "";

        new QRCode(document.getElementById("qrcode"), session);

        // listener stays same below...
     unsubscribe = db.collection("attendance")
        .where("sessionId", "==", createdAt)
        .onSnapshot((snapshot) => {
    
            let table = document.getElementById("attendanceTable");
    
            table.innerHTML = `
            <tr>
                <th>Student</th>
                <th>Subject</th>
                <th>Status</th>
                <th>Time</th>
            </tr>`;
    
            snapshot.forEach(doc => {
                let data = doc.data();
    
                let row = table.insertRow();
    
                row.insertCell(0).innerText = data.student;
                row.insertCell(1).innerText = data.subject;
                let statusCell = row.insertCell(2);
                statusCell.innerText = data.status;
    
                if (data.status === "Late") {
                    statusCell.style.color = "orange";
                }
                row.insertCell(3).innerText =
                    new Date(data.time.seconds * 1000).toLocaleString();
            });
        });

    }, () => {
        alert("Location permission required!");
    }); 
}


</script>

</body>
</body>
</html>
