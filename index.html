<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>

    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Scan QR for Attendance</h2>

<button onclick="startScanner()">Start Scanner</button>

<br><br>

<div id="reader" style="width:300px;"></div>
<p id="result"></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const studentName = localStorage.getItem("student");

if (!studentName) {
    // If no login → redirect back
    window.location.href = "student-login.html";
}


const firebaseConfig = {
  apiKey: "AIzaSyDT0imNSe8CMSWuxDlzk1oYWefUltH-qsU",
  authDomain: "qr-attendance-system-f58ea.firebaseapp.com",
  projectId: "qr-attendance-system-f58ea",
  storageBucket: "qr-attendance-system-f58ea.firebasestorage.app",
  messagingSenderId: "545066065434",
  appId: "1:545066065434:web:35d9e6c8980a1ed7497ba3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function onScanSuccess(decodedText) {

    const data = JSON.parse(decodedText);

    const currentTime = new Date().getTime();

    const createdTime = data.createdAt;
    const duration = data.duration * 60 * 1000; // convert minutes to ms

    const expiryTime = createdTime + duration;

    let status = "";

    if (currentTime > expiryTime) {
        document.getElementById("result").innerText = "QR Expired!";
        return;
    }

    // Mark Late if crossed half duration
    if (currentTime > (createdTime + duration / 2)) {
        status = "Late";
    } else {
        status = "Present";
    }

    const docId = studentName + "_" + createdTime;

   navigator.geolocation.getCurrentPosition((position) => {

    const studentLat = position.coords.latitude;
        const studentLng = position.coords.longitude;

        const teacherLat = data.lat;
        const teacherLng = data.lng;

        if (!teacherLat || !teacherLng) {
            document.getElementById("result").innerText = "Invalid QR (no location)";
            return;
        }
        const distance = getDistance(studentLat, studentLng, teacherLat, teacherLng);
        console.log("Distance:", distance);
        if (distance > 0.2) {
            document.getElementById("result").innerText =
                "You are too far! Attendance blocked.";
            return;
        }

        // ✅ ONLY HERE we save attendance
        db.collection("attendance").doc(docId).set({
            student: studentName,
            subject: data.subject,
            status: status,
            time: new Date(),
            sessionId: data.createdAt
        });

        document.getElementById("result").innerText =
            "Attendance Marked: " + status;
    });

}

function startScanner() {

    let scanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: 250 });

    scanner.render(onScanSuccess);
}

function getDistance(lat1, lon1, lat2, lon2) {

    const R = 6371; // km

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}
</script>


</body>
</html>
