<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>

    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Scan QR for Attendance</h2>

<div id="reader" style="width:300px;"></div>
<p id="result"></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDT0imNSe8CMSWuxDlzk1oYWefUltH-qsU",
  authDomain: "qr-attendance-system-f58ea.firebaseapp.com",
  projectId: "qr-attendance-system-f58ea",
  storageBucket: "qr-attendance-system-f58ea.firebasestorage.app",
  messagingSenderId: "545066065434",
  appId: "1:545066065434:web:35d9e6c8980a1ed7497ba3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function onScanSuccess(decodedText) {

    const studentName = "Student1"; // you can change later

    const docId = studentName + "_" + decodedText;

    db.collection("attendance").doc(docId).set({
        student: studentName,
        session: decodedText,
        time: new Date()
    });

    document.getElementById("result").innerText =
        "Attendance Marked (Only Once)";
}

let scanner = new Html5QrcodeScanner(
    "reader", { fps: 10, qrbox: 250 });

scanner.render(onScanSuccess);
</script>

</body>
</html>
