<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>Student Login</h2>

<input type="text" id="rollNumber" placeholder="Enter Roll Number">
<br>
<button onclick="login()">Login</button>

<p id="error" style="color:red;"></p>

<script>

// Simple student list
const validStudents = [
    "S1",
    "S2",
    "S3",
    "S4",
    "S5"
];

function login() {

    const roll = document.getElementById("rollNumber").value.trim();

    if (roll === "") {
        document.getElementById("error").innerText = "Enter Roll Number";
        return;
    }

    if (!validStudents.includes(roll)) {
        document.getElementById("error").innerText = "Invalid Student!";
        return;
    }

    // Save roll number in browser
    localStorage.setItem("student", roll);

    // Redirect to scanner page
    window.location.href = "index.html";
}

</script>

</body>
</html>
